services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swaprouter
      POSTGRES_PASSWORD: swaprouter
      POSTGRES_DB: swaprouter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: